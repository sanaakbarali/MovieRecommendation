# ==========================================
# DATABASE CONFIGURATION
# ==========================================

# Local Development (your computer)
db.driver=com.mysql.cj.jdbc.Driver
db.url=jdbc:mysql://localhost:3306/login_db?useSSL=false&serverTimezone=UTC
db.username=root
db.password=

# Aiven Production (will be overridden by environment variables)
db.production.driver=com.mysql.cj.jdbc.Driver
db.production.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:login_db}?useSSL=${DB_SSL:false}&requireSSL=${DB_SSL:false}&serverTimezone=UTC
db.production.username=${DB_USER:root}
db.production.password=${DB_PASSWORD:}

# Connection Pool Settings
db.maxActive=10
db.maxIdle=5
db.minIdle=2
db.initialSize=2
db.maxWait=30000
db.validationQuery=SELECT 1
db.testOnBorrow=true
db.removeAbandoned=true
db.removeAbandonedTimeout=60